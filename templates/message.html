<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} — {{ site_name }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; color: #222;
           min-height: 100vh; display: flex; flex-direction: column; }
    .hero { background: #0D1B2A; border-left: 5px solid #22D3A5; padding: 1rem 1.5rem; }
    .hero a { color: #22D3A5; font-weight: 700; text-decoration: none; font-size: 1.1rem; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 1.5rem; }
    .card { background: #fff; border-radius: 10px; padding: 2.5rem 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,.08); max-width: 480px; width: 100%; text-align: center; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: 0.75rem; color: #0D1B2A; }
    p { color: #555; line-height: 1.65; margin-bottom: 1.5rem; }
    a.btn { display: inline-block; background: #22D3A5; color: #0D1B2A; font-weight: 600;
            padding: 0.65rem 1.5rem; border-radius: 6px; text-decoration: none;
            font-size: 0.9rem; }
    a.btn:hover { background: #1bb890; }
  </style>
  {% include "_umami.html" %}
</head>
<body>
  <header class="hero">
    <a href="/">{{ site_name }}</a>
  </header>
  <main>
    <div class="card">
      <div class="icon">{{ icon }}</div>
      <h1>{{ title }}</h1>
      <p>{{ message | safe }}</p>
      {% if cta_url %}
      <a class="btn" href="{{ cta_url }}">{{ cta_text }}</a>
      {% endif %}
    </div>
  </main>
  {% if umami_event %}
  <script>document.addEventListener('DOMContentLoaded', function() {
    if (typeof umami !== 'undefined') umami.track('{{ umami_event }}');
  });</script>
  {% endif %}
</body>
</html>
